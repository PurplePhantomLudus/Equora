<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Equora</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f8fafc; }
        .step { display: none; }
        .step.active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .bg-equora { background: linear-gradient(135deg, #065f46 0%, #0369a1 100%); }
    </style>
</head>
<body class="p-4 min-h-screen">
    <!-- PANTALLA 1: BIENVENIDA -->
    <div id="welcome-screen" class="fixed inset-0 z-50 bg-equora flex flex-col items-center justify-center p-6 text-center text-white">
        <img src="assets/portada.png" class="w-64 mb-8 rounded-3xl shadow-2xl">
        <h1 class="text-6xl font-black uppercase italic mb-2 tracking-tighter">Equora</h1>
        <p class="mb-8 opacity-90 font-medium italic">Sincronía de Ecosistemas</p>
        <div class="grid grid-cols-2 gap-4 w-full max-w-xs">
            <button onclick="setPlayerCount(1)" class="bg-white/20 backdrop-blur-md py-4 rounded-2xl font-bold border border-white/30 hover:bg-white/40">1 Jugador</button>
            <button onclick="setPlayerCount(2)" class="bg-white/20 backdrop-blur-md py-4 rounded-2xl font-bold border border-white/30 hover:bg-white/40">2 Jugadores</button>
            <button onclick="setPlayerCount(3)" class="bg-white/20 backdrop-blur-md py-4 rounded-2xl font-bold border border-white/30 hover:bg-white/40">3 Jugadores</button>
            <button onclick="setPlayerCount(4)" class="bg-white/20 backdrop-blur-md py-4 rounded-2xl font-bold border border-white/30 hover:bg-white/40">4 Jugadores</button>
        </div>
    </div>

    <!-- PANTALLA 2: IDENTIFICACIÓN JUGADORES -->
    <div id="step-names" class="step max-w-md mx-auto bg-white rounded-3xl shadow-xl p-8 text-center mt-10">
        <h2 class="text-2xl font-black text-slate-800 uppercase italic mb-6">👥 Identificar Jugadores</h2>
        <div id="names-container" class="space-y-4 mb-8"></div>
        <button onclick="initRecuento()" class="w-full bg-slate-800 text-white font-black py-5 rounded-2xl shadow-xl uppercase tracking-widest active:scale-95">Empezar ➔</button>
    </div>

    <!-- PANTALLA 3: ASISTENTE DE RECUENTO -->
    <div id="wizard-app" class="hidden max-w-md mx-auto bg-white rounded-3xl shadow-xl overflow-hidden mt-4">
        <div class="p-6 bg-slate-50 border-b flex justify-between items-center">
            <span id="player-indicator" class="text-xs font-black text-slate-400 uppercase tracking-widest"></span>
            <span id="step-id" class="text-[10px] font-bold bg-amber-100 px-3 py-1 rounded-full text-amber-700">PASO 1/3</span>
        </div>

        <div class="p-6">
            <!-- PASO 1: PAISAJES -->
            <div id="recuento1" class="recuento-step active space-y-6">
                <h2 class="text-xl font-black text-slate-800 uppercase italic">🌲 Paisajes Naturales</h2>
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-green-50 p-4 rounded-2xl border border-green-100">
                        <label class="block text-[10px] font-black text-green-700 uppercase mb-2">Árboles (1, 3, 7)</label>
                        <input id="t1" type="number" placeholder="Cant. T1" class="w-full p-2 rounded-lg text-sm mb-1 border-none shadow-inner">
                        <input id="t2" type="number" placeholder="Cant. T2" class="w-full p-2 rounded-lg text-sm mb-1 border-none shadow-inner">
                        <input id="t3" type="number" placeholder="Cant. T3" class="w-full p-2 rounded-lg text-sm border-none shadow-inner">
                    </div>
                    <div class="bg-slate-100 p-4 rounded-2xl border border-slate-200">
                        <label class="block text-[10px] font-black text-slate-700 uppercase mb-2">Montañas Ady.</label>
                        <input id="m2" type="number" placeholder="H2 (3pts)" class="w-full p-2 rounded-lg text-sm mb-1 border-none shadow-inner">
                        <input id="m3" type="number" placeholder="H3 (7pts)" class="w-full p-2 rounded-lg text-sm border-none shadow-inner">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-yellow-50 p-4 rounded-2xl border border-yellow-100">
                        <label class="block text-[10px] font-black text-yellow-700 uppercase mb-2">Prados (5 pts)</label>
                        <input id="fld" type="number" placeholder="Nº Grupos" class="w-full p-2 rounded-lg text-sm border-none shadow-inner">
                    </div>
                    <div class="bg-red-50 p-4 rounded-2xl border border-red-100">
                        <label class="block text-[10px] font-black text-red-700 uppercase mb-2 text-center">Ciudades (5 pts)</label>
                        <input id="bld" type="number" placeholder="Válidos" class="w-full p-2 rounded-lg text-sm border-none shadow-inner text-center">
                    </div>
                </div>
                <div class="bg-blue-50 p-4 rounded-2xl border border-blue-100">
                    <div class="flex gap-2">
                        <select id="w-mode" class="w-1/2 p-2 rounded-lg text-xs font-bold">
                            <option value="A">Lado A: Río</option>
                            <option value="B">Lado B: Islas</option>
                        </select>
                        <input id="w-val" type="number" placeholder="Valor" class="w-1/2 p-2 rounded-lg text-sm border-none shadow-inner">
                    </div>
                </div>
                <div class="text-center">
                    <button onclick="alert('🌲 Árboles: Verde sobre 0-2 marrones.\n⛰️ Montañas: 1-3 grises adyacentes.\n🏠 Edificios: Rojo sobre base (2 niveles) con 3+ colores alrededor.\n🌾 Prados/💧 Agua: No se apilan.')" class="text-[10px] font-bold text-slate-400 border border-slate-300 rounded-full px-4 py-1 uppercase tracking-tighter">❓ Guía de Construcción</button>
                </div>
                <button onclick="nextRecuentoStep(2)" class="w-full bg-slate-800 text-white font-black py-4 rounded-2xl shadow-lg uppercase tracking-widest">Siguiente: Fauna ➔</button>
            </div>

            <!-- PASO 2: FAUNA -->
            <div id="recuento2" class="recuento-step hidden space-y-6">
                <h2 class="text-xl font-black text-amber-600 uppercase italic">🐾 Puntos de Fauna</h2>
                <div class="grid grid-cols-3 gap-3" id="fauna-grid"></div>
                <div class="flex gap-2">
                    <button onclick="nextRecuentoStep(1)" class="w-1/3 bg-slate-200 text-slate-500 font-bold py-4 rounded-2xl uppercase text-xs">Atrás</button>
                    <button onclick="nextRecuentoStep(3)" class="w-2/3 bg-slate-800 text-white font-black py-4 rounded-2xl uppercase tracking-widest">Siguiente: Espíritu ➔</button>
                </div>
            </div>

            <!-- PASO 3: ESPÍRITUS Y DESEMPATE -->
            <div id="recuento3" class="recuento-step hidden space-y-6">
                <h2 class="text-xl font-black text-purple-700 uppercase italic">✨ Ajuste Final</h2>
                <div class="bg-purple-50 p-5 rounded-3xl border border-purple-100 space-y-4">
                    <div class="flex items-center justify-between">
                        <span class="text-xs font-bold text-purple-800 uppercase italic">¿Cubo colocado?</span>
                        <input type="checkbox" id="spirit-check" onchange="toggleSpiritUI()" class="w-6 h-6 accent-purple-600">
                    </div>
                    <div id="spirit-ui" class="hidden space-y-4">
                        <select id="spirit-type" onchange="updateSpiritLogic()" class="w-full p-3 rounded-xl text-sm border-none shadow-sm font-bold bg-white text-purple-900">
                            <option value="none">-- Seleccionar Espíritu --</option>
                            <option value="mountains">Espíritu de las Montañas (H2 y H3)</option>
                            <option value="trees">Espíritu de los Árboles (T2 y T3)</option>
                            <option value="water">Espíritu del Agua (+2 pts/ficha)</option>
                            <option value="other">Otro / Manual</option>
                        </select>
                        <input id="spirit-manual-pts" type="number" placeholder="Introduce los puntos extra" class="hidden w-full p-3 rounded-xl text-sm border-none shadow-inner bg-white">
                        <p id="spirit-preview" class="text-[10px] italic text-purple-600 px-2"></p>
                    </div>
                </div>
                <div class="bg-amber-50 p-5 rounded-3xl border border-amber-100 space-y-2">
                    <label class="block text-[10px] font-black text-amber-800 uppercase italic">Total Cubos Animal (Desempate)</label>
                    <input id="tie-cubes" type="number" placeholder="Cantidad total" class="w-full p-3 rounded-xl text-sm border-none shadow-inner">
                </div>
                <div class="flex gap-2">
                    <button onclick="nextRecuentoStep(2)" class="w-1/3 bg-slate-200 text-slate-500 font-bold py-4 rounded-2xl uppercase text-xs">Atrás</button>
                    <button id="save-btn" onclick="savePlayerData()" class="w-2/3 bg-green-600 text-white font-black py-4 rounded-2xl shadow-lg uppercase tracking-widest italic text-sm">Confirmar Jugador</button>
                </div>
            </div>

            <!-- RESULTADO FINAL -->
            <div id="ranking-screen" class="hidden space-y-6 text-center">
                <div id="ranking-list" class="space-y-3"></div>
                <div id="solo-info" class="hidden p-6 bg-amber-400 rounded-3xl text-slate-900 shadow-xl border-4 border-white">
                    <p class="text-xs font-black uppercase tracking-tighter mb-1">Nivel de Éxito Solitario</p>
                    <p id="soles-display" class="text-4xl font-bold"></p>
                </div>
                <button onclick="location.reload()" class="w-full bg-slate-800 text-white font-black py-4 rounded-2xl uppercase tracking-widest text-xs">Nueva Partida</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
