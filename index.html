<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#064e3b">
    <title>Equora</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background: #f1f5f9; }
        .step { display: none; } .step.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .bg-equora { background: linear-gradient(135deg, #064e3b 0%, #0c4a6e 100%); }
    </style>
</head>
<body>
    <div id="welcome-screen" class="fixed inset-0 z-50 bg-equora flex flex-col items-center justify-center p-8 text-white">
        <img src="assets/portada.png" class="w-64 mb-8 rounded-3xl shadow-2xl" fetchpriority="high">
        <h1 class="text-6xl font-black uppercase italic tracking-tighter">Equora</h1>
        <div class="grid grid-cols-2 gap-4 w-full max-w-xs mt-10">
            <button onclick="setPlayerCount(1)" class="bg-white/10 py-4 rounded-2xl font-bold border border-white/20">1 Jugador</button>
            <button onclick="setPlayerCount(2)" class="bg-white/10 py-4 rounded-2xl font-bold border border-white/20">2 Jugadores</button>
            <button onclick="setPlayerCount(3)" class="bg-white/10 py-4 rounded-2xl font-bold border border-white/20">3 Jugadores</button>
            <button onclick="setPlayerCount(4)" class="bg-white/10 py-4 rounded-2xl font-bold border border-white/20">4 Jugadores</button>
        </div>
    </div>

    <div id="step-names" class="step max-w-md mx-auto bg-white rounded-3xl shadow-xl p-8 text-center mt-10">
        <h2 class="text-2xl font-black text-slate-800 uppercase italic mb-6">👥 Jugadores</h2>
        <div id="names-container" class="space-y-4 mb-8"></div>
        <button onclick="initRecuento()" class="w-full bg-slate-800 text-white font-black py-5 rounded-2xl uppercase tracking-widest italic">Comenzar ➔</button>
    </div>

    <div id="wizard-app" class="hidden max-w-md mx-auto bg-white rounded-3xl shadow-xl overflow-hidden mt-4">
        <div class="p-6 bg-slate-50 border-b flex justify-between items-center">
            <span id="player-indicator" class="text-xs font-black text-slate-400 uppercase"></span>
            <span id="step-indicator" class="text-[10px] font-bold bg-emerald-100 px-3 py-1 rounded-full text-emerald-700">PASO 1/3</span>
        </div>
        <div class="p-6">
            <div id="recuento1" class="recuento-step active space-y-6">
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-green-50 p-4 rounded-2xl border border-green-100">
                        <label class="block text-[10px] font-bold text-green-700 uppercase mb-2">🌳 Árboles (1, 3, 7)</label>
                        <input id="t1" type="number" placeholder="Nivel 1" class="w-full p-2 rounded-lg text-sm mb-1">
                        <input id="t2" type="number" placeholder="Nivel 2" class="w-full p-2 rounded-lg text-sm mb-1">
                        <input id="t3" type="number" placeholder="Nivel 3" class="w-full p-2 rounded-lg text-sm">
                    </div>
                    <div class="bg-slate-50 p-4 rounded-2xl border border-slate-200">
                        <label class="block text-[10px] font-bold text-slate-700 uppercase mb-2">⛰️ Montañas Ady.</label>
                        <input id="m2" type="number" placeholder="H2 (3 pts)" class="w-full p-2 rounded-lg text-sm mb-1">
                        <input id="m3" type="number" placeholder="H3 (7 pts)" class="w-full p-2 rounded-lg text-sm">
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-yellow-50 p-4 rounded-2xl border border-yellow-100">
                        <label class="block text-[10px] font-bold text-yellow-700 uppercase mb-2">🌾 Prados (5 pts)</label>
                        <input id="fld" type="number" placeholder="Grupos" class="w-full p-2 rounded-lg text-sm">
                    </div>
                    <div class="bg-red-50 p-4 rounded-2xl border border-red-100">
                        <label class="block text-[10px] font-bold text-red-700 uppercase mb-2">🏠 Ciudades (5 pts)</label>
                        <input id="bld" type="number" placeholder="Válidos" class="w-full p-2 rounded-lg text-sm">
                    </div>
                </div>
                <div class="bg-blue-50 p-4 rounded-2xl border border-blue-100 flex gap-2">
                    <select id="w-mode" class="w-1/2 p-2 rounded-lg text-xs font-bold"><option value="A">Río (A)</option><option value="B">Islas (B)</option></select>
                    <input id="w-val" type="number" placeholder="Fichas" class="w-1/2 p-2 rounded-lg text-sm">
                </div>
                <button onclick="nextRecuentoStep(2)" class="w-full bg-slate-800 text-white font-black py-4 rounded-2xl shadow-lg uppercase tracking-widest">🐾 Fauna ➔</button>
            </div>
            <div id="recuento2" class="recuento-step hidden space-y-6">
                <div class="grid grid-cols-3 gap-3" id="fauna-grid"></div>
                <button onclick="nextRecuentoStep(3)" class="w-full bg-slate-800 text-white font-black py-4 rounded-2xl shadow-lg uppercase tracking-widest">✨ Final ➔</button>
            </div>
            <div id="recuento3" class="recuento-step hidden space-y-6">
                <div class="bg-purple-50 p-5 rounded-3xl border border-purple-100 space-y-4 text-center">
                    <div class="flex items-center justify-between"><span class="text-xs font-black text-purple-800 uppercase italic">¿Espíritu logrado?</span><input type="checkbox" id="spirit-check" onchange="toggleSpiritUI()" class="w-6 h-6"></div>
                    <div id="spirit-ui" class="hidden space-y-4">
                        <select id="spirit-type" onchange="updateSpiritLogic()" class="w-full p-3 rounded-xl text-sm font-bold"><option value="none">-- Elegir Espíritu --</option><option value="mountains">Espíritu Montañas</option><option value="trees">Espíritu Árboles</option><option value="water">Espíritu Agua</option><option value="other">Otro / Manual</option></select>
                        <input id="spirit-manual-pts" type="number" placeholder="Puntos extra" class="hidden w-full p-3 rounded-xl">
                        <p id="spirit-preview" class="text-[10px] italic text-purple-600"></p>
                    </div>
                </div>
                <div class="bg-amber-50 p-5 rounded-3xl border border-amber-100 text-center">
                    <label class="block text-[10px] font-black text-amber-800 uppercase italic mb-2">Animales en tablero (Desempate)</label>
                    <input id="tie-cubes" type="number" placeholder="Cant. cubos ámbar" class="w-full p-3 rounded-xl text-center font-black border-none shadow-inner">
                </div>
                <button id="save-btn" onclick="savePlayerData()" class="w-full bg-emerald-600 text-white font-black py-5 rounded-2xl shadow-xl uppercase italic tracking-widest">Confirmar</button>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
